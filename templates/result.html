<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Analysis Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;

    /* ✨ MATCHED BLACK + GOLD THEME */
    background:
    radial-gradient(circle at 15% 20%, rgba(212,175,55,.12), transparent 30%),
    radial-gradient(circle at 85% 30%, rgba(255,215,0,.08), transparent 35%),
    radial-gradient(circle at 50% 90%, rgba(212,175,55,.06), transparent 40%),
    linear-gradient(135deg, #050505, #0a0a0a, #000000);

    color:white;
}

.card{

    width:100%;
    max-width:1000px;

    background:rgba(255,255,255,.04);

    backdrop-filter:blur(25px);

    border:1px solid rgba(212,175,55,.18);

    border-radius:28px;

    padding:40px;

    box-shadow:
    0 0 40px rgba(212,175,55,.08),
    0 20px 60px rgba(0,0,0,.7);

    transition:0.3s ease;
}

.card:hover{
    border-color:rgba(212,175,55,.35);
}

.title{

    text-align:center;

    font-size:2.8rem;

    font-weight:800;

    background:linear-gradient(90deg,#d4af37,#f5d76e,#c9a227);

    background-size:200%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:goldFlow 5s linear infinite;

    margin-bottom:30px;
}

.content{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    align-items:center;
}

/* 🖼 IMAGE */
.image-box{
    text-align:center;
}

.image-box img{

    width:100%;
    max-width:420px;

    border-radius:18px;

    border:1px solid rgba(212,175,55,.25);

    box-shadow:0 15px 40px rgba(0,0,0,.6);
}

/* 📦 RESULT CARD */
.result-box{

    background:rgba(255,255,255,.03);

    border:1px solid rgba(212,175,55,.12);

    border-radius:20px;

    padding:30px;
}

/* LABELS */
.label{
    color:#cfcfcf;
    font-size:.9rem;
    margin-bottom:6px;
}

/* 🧠 DISEASE RESULT */
.disease{

    font-size:2rem;
    font-weight:700;

    color:#d4af37;

    margin-bottom:25px;
}

/* CONFIDENCE */
.confidence-value{

    font-size:1.5rem;
    font-weight:700;

    color:#f5d76e;

    margin-bottom:12px;
}

/* PROGRESS BAR */
.progress{

    height:14px;

    background:rgba(255,255,255,.08);

    border-radius:50px;

    overflow:hidden;

    margin-bottom:25px;
}

.progress-bar{

    height:100%;

    width: {{ confidence }}%;

    background:linear-gradient(90deg,#d4af37,#f5d76e,#c9a227);

    border-radius:50px;

    transition:width 0.5s ease;
}

/* NOTE */
.note{

    color:#cfcfcf;

    line-height:1.6;

    font-size:.95rem;
}

/* BACK BUTTON */
.back-btn{

    display:block;
    width:240px;

    margin:35px auto 0;

    text-align:center;

    text-decoration:none;

    color:#111;

    padding:14px;

    border-radius:50px;

    background:linear-gradient(135deg,#d4af37,#f5d76e);

    font-weight:700;

    transition:.3s ease;

    box-shadow:0 10px 25px rgba(212,175,55,.15);
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(212,175,55,.25);
}

/* ANIMATION */
@keyframes goldFlow{
0%{background-position:0%;}
100%{background-position:200%;}
}

/* 📱 RESPONSIVE */
@media(max-width:850px){

.content{
    grid-template-columns:1fr;
}

.title{
    font-size:2rem;
}

.result-box{
    padding:20px;
}

}

</style>

</head>

<body>

<div class="card">

<h1 class="title"> Analysis Result</h1>

<div class="content">

    <div class="image-box">
        <img src="{{ url_for('static', filename='uploads/' + image_path) }}"
             alt="Uploaded Image">
    </div>

    <div class="result-box">

        <div class="label">Predicted Condition</div>

        <div class="disease">{{ result }}</div>

        <div class="label">Confidence Level</div>

        <div class="confidence-value">{{ confidence }}%</div>

        <div class="progress">
            <div class="progress-bar"></div>
        </div>

        <div class="note">
            this is just a prediction
        </div>

    </div>

</div>

<a href="/" class="back-btn">
 Analyze Another Image
</a>

</div>

</body>
</html>
